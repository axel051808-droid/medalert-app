<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAlert Pro Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #2ecc71;
            --text: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid #334155;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .timer-setup {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px inset #334155;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        input {
            width: 60px;
            background: transparent;
            border: 2px solid #334155;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active { transform: scale(0.98); }

        .btn-set { background: var(--primary); color: #0f172a; margin-top: 15px; }
        .btn-stop { background: var(--warning); color: #fff; }
        .btn-reset { background: var(--danger); color: #fff; }

        .status-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            margin-top: 15px;
            color: #94a3b8;
            min-height: 20px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background: #475569;
        }

        .online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    </style>
</head>
<body>

<div class="container" onclick="enableInteraction()">
    <h1>MEDALERT</h1>
    <p style="font-size: 0.9rem; opacity: 0.7;">Smart Pill Dispenser Control</p>

    <div class="timer-setup">
        <p style="margin-top: 0; font-size: 0.8rem; color: var(--primary);">SET SCHEDULE (HH:MM:SS)</p>
        <div class="input-group">
            <input type="number" id="hrInput" placeholder="00" min="0" max="99">
            <span>:</span>
            <input type="number" id="minInput" placeholder="00" min="0" max="59">
            <span>:</span>
            <input type="number" id="secInput" placeholder="00" min="0" max="59">
        </div>
        <button class="btn btn-set" onclick="setFullTime()">Update Schedule</button>
    </div>

    <button class="btn btn-stop" onclick="sendSignal('STOP')">Silence Alarm</button>
    <button class="btn btn-reset" onclick="sendSignal('RESET')">Manual Reset</button>

    <div class="status-msg">
        <div id="statusDot" class="status-dot"></div>
        <span id="status">System Connecting...</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://medalert-6a59f-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Interaction check for Browser Vibration [cite: 2026-03-01]
    function enableInteraction() {
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }
    }

    function setFullTime() {
        const h = parseInt(document.getElementById("hrInput").value) || 0;
        const m = parseInt(document.getElementById("minInput").value) || 0;
        const s = parseInt(document.getElementById("secInput").value) || 0;
        const totalSeconds = (h * 3600) + (m * 60) + s;
        
        if(totalSeconds > 0) {
            database.ref('medalert/command').set("TIME:" + totalSeconds).then(() => {
                showStatus(`Timer synced: ${h}h ${m}m ${s}s`);
            });
        }
    }

    function sendSignal(action) {
        // Aligned with ESP32 Serial monitoring [cite: 2026-03-01]
        database.ref('medalert/command').set(action).then(() => {
            showStatus(`Command Sent: ${action}`);
        });
    }

    function showStatus(msg) {
        const statusEl = document.getElementById("status");
        statusEl.innerText = msg;
        setTimeout(() => { 
            // Return to power status display [cite: 2026-03-01]
            database.ref('medalert/system_power').once('value', (s) => {
                statusEl.innerText = s.val() === "ON" ? "System Online" : "System Offline";
            });
        }, 3000);
    }

    // MONITOR SYSTEM POWER [cite: 2026-03-01]
    database.ref('medalert/system_power').on('value', (snapshot) => {
        const status = snapshot.val();
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("status");
        if (status === "ON") {
            dot.className = "status-dot online";
            text.innerText = "System Online";
        } else {
            dot.className = "status-dot offline";
            text.innerText = "System Offline";
        }
    });

    // TRIGGER VIBRATION & NOTIFICATION [cite: 2026-03-01]
    database.ref('medalert/alarm_trigger').on('value', (snapshot) => {
        if (snapshot.val() === "ON") {
            if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
            if (Notification.permission === "granted") {
                new Notification("MEDALERT: Time for Medication!");
            }
        } else {
            if (navigator.vibrate) navigator.vibrate(0);
        }
    });
</script>

</body>
</html>
