<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAlert Caregiver Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #1e293b; padding: 2rem; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #38bdf8; position: relative; }
        h1 { color: #38bdf8; letter-spacing: 2px; }
        
        /* Scroller UI */
        .picker-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0; }
        .column { display: flex; flex-direction: column; align-items: center; }
        .num { font-size: 2.5rem; font-weight: bold; background: #0f172a; padding: 10px; border-radius: 10px; border: 1px solid #334155; min-width: 50px; }
        .arrow { cursor: pointer; color: #38bdf8; font-size: 1.5rem; padding: 5px; user-select: none; }
        .ampm { background: #334155; padding: 10px; border-radius: 5px; cursor: pointer; user-select: none; }

        button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: #38bdf8; color: #000; }
        .btn-silence { background: #334155; color: #f59e0b; border: 1px solid #f59e0b; }
        .btn-reset { background: transparent; color: #ff4444; font-size: 0.8rem; }

        /* Tracker Circles */
        .history-section { margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px; }
        .day-grid { display: flex; justify-content: space-between; margin-top: 10px; }
        .day-circle { width: 32px; height: 32px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; transition: 0.3s; }
        
        #notify-status { font-size: 0.65rem; color: #00ff88; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>MEDALERT</h1>
    <span id="notify-status">Caregiver Notifications: ACTIVE</span>
    
    <p style="font-size: 0.7rem; color: #38bdf8;">SET MEDICATION TIME</p>

    <div class="picker-container">
        <div class="column">
            <div class="arrow" onclick="changeVal('hr', 1)">▲</div>
            <div class="num" id="hr">08</div>
            <div class="arrow" onclick="changeVal('hr', -1)">▼</div>
        </div>
        <div style="font-size: 2rem;">:</div>
        <div class="column">
            <div class="arrow" onclick="changeVal('min', 1)">▲</div>
            <div class="num" id="min">00</div>
            <div class="arrow" onclick="changeVal('min', -1)">▼</div>
        </div>
        <div class="ampm" id="ampm" onclick="toggleAMPM()">AM</div>
    </div>

    <button class="btn-save" onclick="saveAlarm()">SAVE ALARM</button>
    <button class="btn-silence" onclick="sendCommand('STOP')">SILENCE ALARM</button>
    <button class="btn-reset" onclick="sendCommand('RESET')">RESET SYSTEM</button>

    <div class="history-section">
        <p style="font-size: 0.8rem; margin: 0;">DOSAGE TRACKER</p>
        <div id="day-grid" class="day-grid"></div>
    </div>
    <p id="status" style="font-size: 0.8rem; color: #64748b; margin-top: 15px;">Hardware Connected</p>
</div>

<script>
    // 1. Firebase Config
    const firebaseConfig = { databaseURL: "https://medalert-6a59f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Timer Variables
    let h = 8, m = 0, ap = "AM";

    // 3. UI Functions
    function changeVal(type, dir) {
        if (type === 'hr') {
            h += dir;
            if (h > 12) h = 1;
            if (h < 1) h = 12;
            document.getElementById('hr').innerText = h < 10 ? "0" + h : h;
        } else {
            m += dir;
            if (m > 59) m = 0;
            if (m < 0) m = 59;
            document.getElementById('min').innerText = m < 10 ? "0" + m : m;
        }
    }

    function toggleAMPM() { 
        ap = ap === "AM" ? "PM" : "AM"; 
        document.getElementById('ampm').innerText = ap; 
    }

    function saveAlarm() {
        let hour24 = h;
        if (ap === "PM" && h < 12) hour24 = h + 12;
        if (ap === "AM" && h === 12) hour24 = 0;
        let timeStr = (hour24 < 10 ? "0" + hour24 : hour24) + ":" + (m < 10 ? "0" + m : m);
        db.ref("medalert/command").set("SET_ALARM:" + timeStr);
        alert("Success: Alarm scheduled for " + h + ":" + (m < 10 ? "0" + m : m) + " " + ap);
    }

    function sendCommand(cmd) { db.ref("medalert/command").set(cmd); }

    // 4. Tracker Circle Setup
    const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    const grid = document.getElementById('day-grid');
    days.forEach((d, i) => {
        let div = document.createElement('div');
        div.className = 'day-circle'; div.id = 'day-'+i; div.innerText = d;
        grid.appendChild(div);
    });

    // 5. CAREGIVER NOTIFICATION & TRACKER LOGIC
    // Request notification permission on load
    if (Notification.permission !== "granted") { Notification.requestPermission(); }

    db.ref("medalert/last_action").on("value", (snap) => {
        const action = snap.val();
        const today = new Date().getDay();
        const circle = document.getElementById('day-'+today);

        if (action === "Meds Taken") { 
            circle.style.background = "#00ff88"; 
            circle.style.color = "#000"; 
            circle.style.boxShadow = "0 0 10px #00ff88";
            
            // Trigger Notification
            if (Notification.permission === "granted") {
                new Notification("MedAlert Update", { body: "Confirmed: Medication has been taken!" });
            }
            alert("CAREGIVER NOTIFICATION: Patient has taken their meds.");
        }
        else if (action === "Missed") { 
            circle.style.background = "#ff4444"; 
            circle.style.boxShadow = "0 0 10px #ff4444";
            if (Notification.permission === "granted") {
                new Notification("ALERT", { body: "Warning: Medication dose was missed!" });
            }
        }
    });
</script>
</body>
</html>
